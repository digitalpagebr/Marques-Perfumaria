<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marques Perfumaria</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&family=Poppins:wght@300;400&display=swap" rel="stylesheet">

<style>

/* 🌌 FUNDO PREMIUM */
body {
  margin: 0;
  color: #fff;
  font-family: 'Poppins', sans-serif;

  background:
    radial-gradient(circle at top, rgba(212,175,55,0.10), transparent 40%),
    radial-gradient(circle at bottom, rgba(212,175,55,0.06), transparent 50%),
    #000;
}

/* ✨ HEADER GLASS */
header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 18px 40px;

  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(12px);

  border-bottom: 1px solid rgba(212,175,55,0.2);
}

.logo {
  display: flex;
  align-items: center;
  gap: 10px;
}

.logo img { height: 45px; }

.logo span {
  color: #D4AF37;
  font-family: 'Playfair Display', serif;
}

nav a {
  color: #ccc;
  margin-left: 20px;
  text-decoration: none;
  transition: 0.3s;
}

nav a:hover { color: #D4AF37; }

/* HERO */
.hero {
  text-align: center;
  padding: 100px 20px;
}

.hero h1 {
  color: #D4AF37;
  font-size: 42px;
  letter-spacing: 1px;
}

.hero p { color: #aaa; }

/* 💎 BOTÃO PREMIUM */
.btn {
  background: linear-gradient(135deg, #D4AF37, #b8912f);
  color: #000;
  padding: 12px 26px;
  border-radius: 30px;
  border: none;
  cursor: pointer;
  text-decoration: none;
  display: inline-block;
  font-weight: 600;

  transition: 0.3s;
  box-shadow: 0 5px 20px rgba(212,175,55,0.25);
}

.btn:hover {
  transform: translateY(-3px);
  box-shadow: 0 10px 30px rgba(212,175,55,0.4);
}

/* SEÇÕES */
.section {
  padding: 60px 20px;
  text-align: center;
}

/* 🛍️ PRODUTOS PREMIUM */
.cards {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 20px;
}

.card {
  background: linear-gradient(145deg, #111, #0a0a0a);
  border: 1px solid rgba(212,175,55,0.15);
  padding: 20px;
  border-radius: 16px;
  width: 250px;

  transition: 0.3s;
}

.card:hover {
  transform: translateY(-8px);
  border-color: rgba(212,175,55,0.4);
  box-shadow: 0 15px 40px rgba(0,0,0,0.6);
}

.card img {
  width: 100%;
  height: 200px;
  object-fit: cover;
  border-radius: 10px;
}

.card h3 { color: #D4AF37; }

/* 🛒 CARRINHO LUXO */
.carrinho-box {
  max-width: 650px;
  margin: auto;
  background: linear-gradient(145deg, #1a1a1a, #0f0f0f);
  border: 1px solid rgba(212,175,55,0.3);
  padding: 30px;
  border-radius: 16px;
  box-shadow: 0 0 30px rgba(212,175,55,0.06);
}

.item-carrinho {
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: #000;
  padding: 14px;
  border-radius: 10px;
  margin-bottom: 10px;
}

.btn-remover {
  background: none;
  border: 1px solid #ff4444;
  color: #ff4444;
  border-radius: 50%;
  width: 25px;
  height: 25px;
  cursor: pointer;
  transition: 0.2s;
}

.btn-remover:hover {
  background: #ff4444;
  color: #000;
}

.total {
  color: #D4AF37;
  font-size: 20px;
  text-align: right;
  margin-top: 15px;
}

/* FORM */
.form-carrinho {
  margin-top: 20px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

.form-carrinho input,
.form-carrinho select {
  padding: 10px;
  border-radius: 8px;
  background: #000;
  border: 1px solid rgba(212,175,55,0.2);
  color: #fff;
}

/* FOOTER */
footer {
  text-align: center;
  padding: 20px;
  border-top: 1px solid rgba(212,175,55,0.2);
  color: #777;
}

/* WHATSAPP */
.whatsapp-float {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #25D366;
  padding: 15px;
  border-radius: 50%;
  text-decoration: none;
  color: #fff;
  font-size: 20px;
}

/* UX */
* { scroll-behavior: smooth; }

::selection {
  background: #D4AF37;
  color: #000;
}

</style>
</head>

<body>

<header>
  <div class="logo">
    <img src="logo.png">
    <span>Marques Perfumaria</span>
  </div>

  <nav>
    <a href="#">Início</a>
    <a href="#produtos">Perfumes</a>
    <a href="#carrinho">Carrinho</a>
    <a href="#instagram">Instagram</a>
  </nav>
</header>

<section class="hero">
  <h1>Elegância em cada fragrância</h1>
  <p>Perfumes originais sob encomenda</p>

  <a class="btn" href="#produtos">Ver Produtos</a>
</section>

<!-- PRODUTOS -->
<section id="produtos" class="section">
  <h2 style="color:#D4AF37;">Produtos</h2>
  <div class="cards"></div>


  <!-- 📄 CATÁLOGO -->
  <p><a class="btn" href="https://drive.google.com/file/d/1w6c4DnRyiCZH23ElT6K7WaHjAuIYHhX9/view" target="_blank">
    Ver Catálogo Completo
  </a></p>
</section>

<!-- CARRINHO -->
<section class="section">
  <h2 style="color:#D4AF37;">Carrinho</h2>

  <div class="carrinho-box">
    <div id="carrinho"></div>

    <p class="total">Total: R$ <span id="total">0</span></p>

    <div class="form-carrinho">
      <input type="text" id="nomeCliente" placeholder="Seu nome">
      <input type="text" id="endereco" placeholder="Endereço">

      <select id="tipoEntrega">
        <option>Entrega</option>
        <option>Retirada</option>
      </select>

      <select id="pagamento">
        <option>Pix</option>
        <option>Dinheiro</option>
        <option>Cartão</option>
      </select>
    </div>

    <button class="btn" onclick="finalizar()">Finalizar Pedido</button>
  </div>
</section>

<!-- 📷 INSTAGRAM -->
<section class="section">
  <h2 style="color:#D4AF37;">Instagram</h2>
  <a class="btn" href="https://www.instagram.com/marquesperfumaria_" target="_blank">
    Acessar Instagram
  </a>
</section>

<footer>
© 2026 Marques Perfumaria
</footer>

<!-- WHATSAPP -->
<a href="https://wa.me/5591984141196" class="whatsapp-float">💬</a>

<script>
let carrinho = {};

async function carregarProdutos() {
  const res = await fetch("https://marques-perfmuaria-default-rtdb.firebaseio.com/produtos.json");
  const dados = await res.json();

  const container = document.querySelector(".cards");
  container.innerHTML = "";

  for (let cat in dados) {
    for (let id in dados[cat]) {
      let p = dados[cat][id];

      container.innerHTML += `
        <div class="card">
          <img src="${p.imagem}">
          <h3>${p.nome}</h3>
          <p>R$ ${Number(p.preco).toFixed(2)}</p>
          <button class="btn" onclick="add('${p.nome}', ${Number(p.preco)})">Adicionar</button>
        </div>
      `;
    }
  }
}

function add(nome, preco) {
  if (carrinho[nome]) carrinho[nome].qtd++;
  else carrinho[nome] = { preco, qtd: 1 };
  atualizar();
}

function remover(nome) {
  delete carrinho[nome];
  atualizar();
}

function atualizar() {
  let div = document.getElementById("carrinho");
  let total = 0;
  div.innerHTML = "";

  for (let i in carrinho) {
    let p = carrinho[i];
    let sub = p.preco * p.qtd;
    total += sub;

    div.innerHTML += `
      <div class="item-carrinho">
        ${i} (${p.qtd}) - R$ ${sub.toFixed(2)}
        <button class="btn-remover" onclick="remover('${i}')">x</button>
      </div>
    `;
  }

  document.getElementById("total").innerText = total.toFixed(2);
}

function finalizar() {
  const nome = document.getElementById("nomeCliente").value;
  const endereco = document.getElementById("endereco").value;
  const entrega = document.getElementById("tipoEntrega").value;
  const pagamento = document.getElementById("pagamento").value;

  if (!nome || Object.keys(carrinho).length === 0) {
    alert("Preencha tudo!");
    return;
  }

  let msg = `*NOVO PEDIDO*%0A%0A`;
  msg += `Cliente: ${nome}%0A`;
  msg += `Endereço: ${endereco}%0A`;

  for (let i in carrinho) {
    msg += `${i} x${carrinho[i].qtd}%0A`;
  }

  window.open(`https://wa.me/5591984141196?text=${msg}`);
}

carregarProdutos();
</script>

</body>
</html>
